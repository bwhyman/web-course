<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            flex-direction: column;
            max-width: 992px;
            min-height: 100vh;
            margin: auto;
        }

        #main {
            flex-grow: 1;
            display: flex;
        }

        #article {
            margin: 0 15px;
            height: 100%;

        }

        #sidebar {
            margin: 0 15px;
        }

        ul {
            list-style: none;
        }

        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }

        table thead {
            background-color: #4caf50;
            color: white;
        }

        table th, table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        a.btn {
            display: inline-block;
            background-color: #f44336;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="header"></div>
    <div id="main">
        <div id="sidebar"></div>
        <div id="article">
            <table>
                <thead>
                <tr>
                    <td>#</td>
                    <td>姓名</td>
                    <td>操作</td>
                </tr>
                </thead>
                <tbody id="users-tbody">

                </tbody>
            </table>
        </div>
    </div>
    <div id="footer"></div>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
    $(async function () {
        $('#header').load('./layout/header.html')
        $('#sidebar').load('./layout/sidebar.html')
        $('#footer').load('./layout/footer.html')

        const data = await fetch('api/listusers').then(resp => resp.json())

        data.forEach((u, index) => {
            $('#users-tbody').append(`
            <tr>
                <td>${index + 1}</td>
                <td>${u.name}</td>
                <td><a href="" class="btn">编辑</a></td>
            </tr>`)
        })

    })
</script>
</body>
</html>
